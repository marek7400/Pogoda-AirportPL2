name: Build Check & Auto PR

on:
  workflow_dispatch:
  push:
    branches:
      - '**' # Triggers on ALL branches including main

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Create Pull Request (only if NOT on main)
        if: github.ref_name != 'main'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automatyczna aktualizacja z AI Studio Build"
          title: "Gotowa paczka zmian z AI Studio"
          body: |
            Ten PR został wygenerowany po wykryciu zmian na gałęzi `${{ github.ref_name }}`.
            
            **Status Builda:** SUCCEEDED ✅
          branch: ${{ github.ref_name }}
          base: main

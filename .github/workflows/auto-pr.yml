name: Auto Build and PR

on:
  push:
    branches:
      - 'update/**'
      - 'feature/**'
      - 'dev/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automatyczna aktualizacja z AI Studio Build"
          title: "Aktualizacja: ${{ github.ref_name }}"
          body: |
            Ten Pull Request został wygenerowany automatycznie po eksporcie z AI Studio Build.
            
            **Zmiany w tej wersji:**
            - Automatyczna weryfikacja builda: PASSED ✅
            - Gałąź źródłowa: `${{ github.ref_name }}`
          branch: ${{ github.ref_name }}
          base: main
          delete-branch: false
